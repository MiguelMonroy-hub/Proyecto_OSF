<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/pages/">
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth-back.css">
  <link rel="stylesheet" href="../css/auth-password.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="page-login-new">
  <!-- Volver al inicio -->
  <nav class="auth-nav" aria-label="Navegación">
    <a class="auth-back" href="index.html">
      <span class="auth-back-icon" aria-hidden="true">←</span>
      <span class="auth-back-text">Volver al inicio</span>
    </a>
  </nav>

  <!-- Pantalla de login: correo + contraseña -->
  <div class="modal-login">
    <h1>Iniciar sesión</h1>

    <label for="email">Correo</label>
    <input type="email" id="email" name="email" placeholder="tu@correo.com" autocomplete="username" required>

    <label for="pass">Contraseña</label>
    <div class="auth-password-wrap">
      <input type="password" id="pass" name="pass" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <p id="login-error" class="login-error" role="alert" hidden></p>

    <button type="button" class="btn-submit" onclick="entrar()">Entrar</button>

    <p class="switch">¿No tienes cuenta? <a href="signup.html">Crear cuenta</a></p>
  </div>

  <!-- Scripts: auth, Supabase y login -->
  <script src="../js/rutas.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/strings.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="../js/auth-validacion.js"></script>
  <script src="../js/auth-password-toggle.js"></script>
  <script src="../js/grupos-clase.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
