<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="page-login-new">
  <a class="link-back" href="index.html">← Inicio</a>

  <div class="modal-login">
    <h1>Iniciar sesión</h1>

    <label for="email">Correo</label>
    <input type="email" id="email" name="email" placeholder="tu@correo.com" autocomplete="username">

    <label for="pass">Contraseña</label>
    <input type="password" id="pass" name="pass" placeholder="••••••••" autocomplete="current-password">

    <div class="row">
      <label><input type="checkbox" name="remember"> Recordarme</label>
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="button" class="btn-submit" onclick="entrar()">Entrar</button>

    <p class="switch">¿No tienes cuenta? <a href="signup.html">Crear cuenta</a></p>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
