<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/pages/">
  <title>Quiz</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/game-bg.css">
  <link rel="stylesheet" href="../css/quiz.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraph.css">
  <link rel="stylesheet" href="../css/ui-toast.css">
</head>
<body class="page-quiz is-quiz-loading quiz--sin-mapa">
  <!-- Aviso cuando el maestro está en vista previa del nivel -->
  <div id="quiz-preview-banner" class="quiz-preview-banner" role="status" hidden></div>
  <!-- Tema y modo leídos de la URL antes de cargar el quiz -->
  <script>
    (function () {
      function textoContextoQuizDesdeUrl() {
        var search = window.location.search || "";
        if (!search && window.location.href.indexOf("?") >= 0) {
          search = "?" + window.location.href.split("?")[1].split("#")[0];
        }
        var params = new URLSearchParams(search);
        if (params.get("tn")) {
          return "";
        }
        var tema = String(params.get("tema") || "1").trim() || "1";
        var modo =
          String(params.get("modo") || "facil").toLowerCase() === "dificil"
            ? "Avanzado"
            : "Básico";
        return "Tema " + tema + " · " + modo;
      }
      function pintarContextoInicial() {
        var texto = textoContextoQuizDesdeUrl();
        if (!texto) {
          return;
        }
        var el = document.getElementById("quiz-context");
        if (el) {
          el.textContent = texto;
        }
      }
      document.addEventListener("DOMContentLoaded", pintarContextoInicial);
      window.addEventListener("pageshow", pintarContextoInicial);
    })();
  </script>
  <!-- Pantalla de carga del nivel -->
  <div id="quiz-loading-overlay" class="quiz-loading-overlay" aria-live="polite" aria-label="Cargando nivel">
    <div class="quiz-loading-card">
      <img
        class="quiz-loading-duck"
        src="../MAIN DUCK/DUCK/MAIN DUCK.png"
        alt="Pato TecDuck"
        width="86"
        height="86"
        onerror="this.hidden=true; var fb=document.getElementById('quiz-loading-duck-fallback'); if (fb) fb.hidden=false;"
      />
      <span id="quiz-loading-duck-fallback" class="quiz-loading-duck-fallback" hidden aria-hidden="true">🦆</span>
      <span class="quiz-loading-brand">TecDuck</span>
      <span class="quiz-loading-main">Cargando la tecduck-aventura</span>
      <span class="quiz-loading-sub">Preparando preguntas, mapa y progreso...</span>
      <span class="quiz-loading-bar" aria-hidden="true"><span class="quiz-loading-bar-fill"></span></span>
    </div>
  </div>
  <!-- Barra superior: contexto, avance, monedas, pato y vidas -->
  <div class="quiz-top">
    <div class="quiz-top-left">
      <span id="quiz-context" class="quiz-context"></span>
      <span id="quiz-progress" class="progress">—</span>
      <span id="quiz-saldo" class="quiz-saldo" aria-live="polite"></span>
    </div>
    <div class="quiz-duck-wrap" aria-hidden="true">
      <div class="duck-stack quiz-duck-stack" id="quiz-duck-stack">
        <img id="quiz-img-base" class="stack-img z-base" src="../MAIN DUCK/DUCK/MAIN DUCK.png" alt="">
        <img id="quiz-img-shoes" class="stack-img z-shoes" alt="" hidden>
        <img id="quiz-img-neck" class="stack-img z-neck" alt="" hidden>
        <img id="quiz-img-face" class="stack-img z-face" alt="" hidden>
        <img id="quiz-img-head" class="stack-img z-head" alt="" hidden>
      </div>
    </div>
    <span id="quiz-hearts" class="hearts" aria-label="Vidas">❤️❤️❤️</span>
  </div>

  <!-- Área de juego: pregunta, opciones, feedback y recompensas -->
  <div class="quiz-box">
    <div id="quiz-jxg-panel" class="quiz-jxg-panel" hidden aria-hidden="true">
      <p class="quiz-jxg-panel-hint">Plano de coordenadas — elige una opción para verla dibujada</p>
      <div id="quizJXGMapaFijo" class="jxgbox quiz-jxg-board-fijo"></div>
    </div>
    <p class="question" id="quiz-question-text"></p>
    <div class="options" id="quiz-options"></div>
    <button type="button" id="quiz-confirmar" class="quiz-confirmar" hidden>Confirmar respuesta</button>
    <div id="quiz-feedback" class="quiz-feedback" hidden></div>
    <p id="quiz-reward-msg" class="quiz-reward-msg" hidden></p>
    <button type="button" id="quiz-siguiente" class="quiz-siguiente" hidden>Siguiente pregunta</button>
    <p id="quiz-gameover" class="quiz-gameover" hidden></p>
  </div>

  <!-- Volver a temas o reiniciar el nivel -->
  <nav class="quiz-nav" aria-label="Navegación del quiz">
    <a href="topics.html" class="quiz-nav-btn quiz-nav-btn--topics" id="quiz-volver-temas" data-volver-temas-skip="1" data-volver-temas="1">
      <svg class="quiz-nav-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      <span class="quiz-nav-label">Volver a temas</span>
    </a>
    <button type="button" class="quiz-nav-btn quiz-nav-btn--retry" id="quiz-reiniciar">
      <svg class="quiz-nav-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" focusable="false">
        <path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08a5.99 5.99 0 0 1-5.65 4c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
      <span class="quiz-nav-label">Reiniciar nivel</span>
    </button>
  </nav>

  <!-- Scripts: banco de preguntas, JSXGraph y lógica del quiz -->
  <script src="../js/rutas.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="../js/strings.js"></script>
  <script src="../js/ui-toast.js"></script>
  <script src="../js/page-load-overlay.js"></script>
  <script src="../js/duck-catalog.js"></script>
  <script src="../js/duck-outfit.js"></script>
  <script src="../js/duck-avatar-sync.js"></script>
  <script src="../js/duck-economia-sync.js"></script>
  <script src="../js/grupos-clase.js"></script>
  <script src="../js/teacher-niveles.js"></script>
  <script src="../js/teacher-niveles-db.js"></script>
  <script src="../js/teacher-auth.js"></script>
  <script src="../js/partida-actividad.js"></script>
  <script src="../js/topic-progress-data.js"></script>
  <script src="../js/topic-progress-ui.js"></script>
  <script src="../js/alumno-guard.js"></script>
  <script src="../js/quiz-bank-loader.js"></script>
  <script src="../banco-preguntas/tema-1/basico/preguntas.js"></script>
  <script src="../banco-preguntas/tema-1/avanzado/preguntas.js"></script>
  <script src="../banco-preguntas/tema-2/basico/preguntas.js"></script>
  <script src="../banco-preguntas/tema-2/avanzado/preguntas.js"></script>
  <script src="../banco-preguntas/tema-3/basico/preguntas.js"></script>
  <script src="../banco-preguntas/tema-3/avanzado/preguntas.js"></script>
  <script src="../banco-preguntas/tema-4/basico/preguntas.js"></script>
  <script src="../banco-preguntas/tema-4/avanzado/preguntas.js"></script>
  <script src="../js/quiz-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph@1.12.2/distrib/jsxgraphcore.js"></script>
  <script src="../js/quiz-option-jxg.js"></script>
  <script src="../js/quiz-jxg-preview.js"></script>
  <script src="../js/quiz.js"></script>
</body>
</html>
