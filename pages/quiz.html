<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/game-bg.css">
  <link rel="stylesheet" href="../css/quiz.css">
</head>
<body class="page-quiz">
  <div class="quiz-top">
    <div class="quiz-top-left">
      <span id="quiz-context" class="quiz-context"></span>
      <span id="quiz-progress" class="progress">—</span>
      <span id="quiz-saldo" class="quiz-saldo" aria-live="polite"></span>
    </div>
    <span id="quiz-hearts" class="hearts" aria-label="Vidas">❤️❤️❤️</span>
  </div>

  <div class="quiz-box">
    <figure id="quiz-figure" class="quiz-figure" hidden>
      <img id="quiz-image" class="quiz-image" alt="" decoding="async" />
    </figure>
    <p class="question" id="quiz-question-text"></p>
    <div class="options" id="quiz-options"></div>
    <div id="quiz-feedback" class="quiz-feedback" hidden></div>
    <p id="quiz-reward-msg" class="quiz-reward-msg" hidden></p>
    <button type="button" id="quiz-siguiente" class="quiz-siguiente" hidden>Siguiente pregunta</button>
    <p id="quiz-gameover" class="quiz-gameover" hidden></p>
  </div>

  <p class="quiz-nav">
    <a href="topics.html">Regresar a temas</a>
    <button type="button" class="quiz-nav-retry" id="quiz-reiniciar">Reiniciar nivel</button>
  </p>

  <div id="quiz-img-lightbox" class="quiz-img-lightbox" hidden aria-modal="true" role="dialog" aria-label="Imagen ampliada">
    <button type="button" class="quiz-img-lightbox-backdrop" id="quiz-img-lightbox-backdrop" tabindex="-1" aria-label="Cerrar"></button>
    <div class="quiz-img-lightbox-panel">
      <button type="button" class="quiz-img-lightbox-close" id="quiz-img-lightbox-close" aria-label="Cerrar vista ampliada">&times;</button>
      <img id="quiz-img-lightbox-img" class="quiz-img-lightbox-img" alt="" decoding="async" />
    </div>
  </div>

  <script src="../js/duck-catalog.js"></script>
  <script src="../js/topic-progress.js"></script>
  <script src="../js/quiz-data.js"></script>
  <script src="../js/quiz.js"></script>
</body>
</html>
