<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/pages/">
  <title>Crear cuenta</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/auth-back.css">
  <link rel="stylesheet" href="../css/signup.css">
</head>
<body class="page-signup-new">
  <!-- Volver al inicio -->
  <nav class="auth-nav" aria-label="Navegación">
    <a class="auth-back" href="index.html">
      <span class="auth-back-icon" aria-hidden="true">←</span>
      <span class="auth-back-text">Volver al inicio</span>
    </a>
  </nav>

  <!-- Formulario de registro: datos personales, correo y contraseña -->
  <div class="modal-signup">
    <h1>Crear cuenta</h1>

    <label for="nombre">Nombre <span class="auth-required" aria-hidden="true">*</span></label>
    <input type="text" id="nombre" name="nombre" autocomplete="given-name" required>

    <label for="apellido">Apellido</label>
    <input type="text" id="apellido" name="apellido" autocomplete="family-name">

    <label for="email">Correo <span class="auth-required" aria-hidden="true">*</span></label>
    <input type="email" id="email" name="email" autocomplete="email" placeholder="tu@correo.com" required>

    <label for="pass">Contraseña <span class="auth-required" aria-hidden="true">*</span></label>
    <input type="password" id="pass" name="pass" placeholder="••••••••" autocomplete="new-password" minlength="8" required aria-describedby="signup-pass-hint">
    <p id="signup-pass-hint" class="signup-pass-hint">Mínimo 8 caracteres, con mayúscula, minúscula, número y carácter especial.</p>

    <label class="signup-maestro-check">
      <input type="checkbox" id="es-maestro" name="es-maestro">
      <span>Soy maestro <span class="signup-temp-tag">(temporal)</span></span>
    </label>

    <p id="signup-error" class="signup-error" hidden></p>

    <button type="button" class="btn-submit" onclick="crearCuenta()">Registrarse</button>

    <p class="switch">¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
  </div>

  <!-- Scripts: auth, Supabase y registro -->
  <script src="../js/rutas.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/strings.js"></script>
  <script src="../js/auth-service.js"></script>
  <script src="../js/auth-validacion.js"></script>
  <script src="../js/grupos-clase.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
